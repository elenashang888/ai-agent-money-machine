<svg width="1080" height="1440" viewBox="0 0 1080 1440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C44569;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1080" height="1440" fill="url(#bgGradient)"/>
  
  <!-- 装饰圆点 -->
  <circle cx="100" cy="100" r="3" fill="white" opacity="0.3"/>
  <circle cx="980" cy="150" r="2" fill="white" opacity="0.2"/>
  <circle cx="150" cy="1300" r="3" fill="white" opacity="0.3"/>
  <circle cx="950" cy="1250" r="2" fill="white" opacity="0.2"/>
  
  <!-- 顶部标签 -->
  <rect x="340" y="60" width="400" height="50" rx="25" fill="white" opacity="0.9"/>
  <text x="540" y="95" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#C44569" text-anchor="middle">🔥 一人公司案例库</text>
  
  <!-- 主标题 -->
  <text x="540" y="200" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">31个真实案例</text>
  <text x="540" y="270" font-family="Arial, sans-serif" font-size="36" fill="#FFD700" text-anchor="middle">揭秘年入百万的密码</text>
  
  <!-- 案例展示区域 -->
  <g transform="translate(100, 350)">
    <!-- 案例1 -->
    <rect x="0" y="0" width="440" height="200" rx="20" fill="white" opacity="0.95"/>
    <text x="30" y="50" font-family="Arial" font-size="28" font-weight="bold" fill="#333">🎨 AI头像定制</text>
    <text x="30" y="90" font-family="Arial" font-size="20" fill="#666">月入：¥5,000-20,000</text>
    <text x="30" y="130" font-family="Arial" font-size="18" fill="#888">启动成本：¥210</text>
    <text x="30" y="170" font-family="Arial" font-size="16" fill="#22C55E">✓ 可复制 ✓ 零门槛</text>
    
    <!-- 案例2 -->
    <rect x="440" y="0" width="440" height="200" rx="20" fill="white" opacity="0.95"/>
    <text x="470" y="50" font-family="Arial" font-size="28" font-weight="bold" fill="#333">💼 AI简历优化</text>
    <text x="470" y="90" font-family="Arial" font-size="20" fill="#666">月入：¥10,000-30,000</text>
    <text x="470" y="130" font-family="Arial" font-size="18" fill="#888">启动成本：¥140</text>
    <text x="470" y="170" font-family="Arial" font-size="16" fill="#22C55E">✓ 高客单 ✓ 复购高</text>
  </g>
  
  <!-- 核心密码 -->
  <g transform="translate(100, 600)">
    <text x="440" y="0" font-family="Arial" font-size="32" font-weight="bold" fill="white" text-anchor="middle">3个核心密码</text>
    
    <!-- 密码1 -->
    <rect x="0" y="40" width="880" height="120" rx="15" fill="white" opacity="0.9"/>
    <text x="30" y="90" font-family="Arial" font-size="48" fill="#FF6B9D" text-anchor="middle">1</text>
    <text x="80" y="80" font-family="Arial" font-size="24" font-weight="bold" fill="#333">AI杠杆效应</text>
    <text x="80" y="110" font-family="Arial" font-size="18" fill="#666">1个AI Agent = 3个员工，成本接近零</text>
    <text x="750" y="90" font-family="Arial" font-size="40" fill="#FFD700">🤖</text>
    
    <!-- 密码2 -->
    <rect x="0" y="180" width="880" height="120" rx="15" fill="white" opacity="0.9"/>
    <text x="30" y="230" font-family="Arial" font-size="48" fill="#FF6B9D" text-anchor="middle">2</text>
    <text x="80" y="220" font-family="Arial" font-size="24" font-weight="bold" fill="#333">精准定位</text>
    <text x="80" y="250" font-family="Arial" font-size="18" fill="#666">不做大而全，只做小而美</text>
    <text x="750" y="230" font-family="Arial" font-size="40" fill="#FFD700">🎯</text>
    
    <!-- 密码3 -->
    <rect x="0" y="320" width="880" height="120" rx="15" fill="white" opacity="0.9"/>
    <text x="30" y="370" font-family="Arial" font-size="48" fill="#FF6B9D" text-anchor="middle">3</text>
    <text x="80" y="360" font-family="Arial" font-size="24" font-weight="bold" fill="#333">自动交付</text>
    <text x="80" y="390" font-family="Arial" font-size="18" fill="#666">客户下单→AI自动交付→睡后收入</text>
    <text x="750" y="370" font-family="Arial" font-size="40" fill="#FFD700">💰</text>
  </g>
  
  <!-- 底部CTA -->
  <g transform="translate(0, 1100)">
    <rect x="140" y="0" width="800" height="80" rx="40" fill="url(#goldGradient)"/>
    <text x="540" y="52" font-family="Arial" font-size="32" font-weight="bold" fill="#1a1a2e" text-anchor="middle">限时免费获取完整案例库 →</text>
    
    <text x="540" y="120" font-family="Arial" font-size="24" fill="white" text-anchor="middle">回复「一人公司」自动领取</text>
    
    <text x="540" y="180" font-family="Arial" font-size="20" fill="#FFD700" text-anchor="middle">✓ 31个完整案例  ✓ 50+Prompt模板  ✓ 工具清单</text>
    
    <text x="540" y="250" font-family="Arial" font-size="18" fill="white" opacity="0.8" text-anchor="middle">仅限前1000名</text>
  </g>
</svg>