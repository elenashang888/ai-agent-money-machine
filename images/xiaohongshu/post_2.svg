    <text x="40" y="90" font-family="Arial" font-size="20" fill="#666">HR小陈，副业超主业</text>
    <text x="40" y="125" font-family="Arial" font-size="18" fill="#888">投入：¥140/月 | 产出：¥10,000-30,000/月</text>
    <text x="700" y="100" font-family="Arial" font-size="48" font-weight="bold" fill="#22C55E" text-anchor="middle">¥20K</text>
    <text x="700" y="140" font-family="Arial" font-size="16" fill="#666" text-anchor="middle">平均月入</text>
