<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B80;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#bg)" filter="url(#shadow)"/>
  
  <!-- 内圈 -->
  <circle cx="100" cy="100" r="70" fill="white" opacity="0.1"/>
  
  <!-- 图标 -->
  <text x="100" y="115" font-family="Arial" font-size="80" text-anchor="middle" fill="white">📈</text>
  
  <!-- 装饰点 -->
  <circle cx="40" cy="50" r="4" fill="white" opacity="0.3"/>
  <circle cx="160" cy="150" r="4" fill="white" opacity="0.3"/>
  <circle cx="150" cy="40" r="3" fill="white" opacity="0.2"/>
</svg>