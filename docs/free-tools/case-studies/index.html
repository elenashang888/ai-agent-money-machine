        function renderCases(filter = 'all') {
            const grid = document.getElementById('casesGrid');
            const filtered = filter === 'all' ? cases : cases.filter(c => c.category === filter);
            
            grid.innerHTML = filtered.map(c => `
                <div class="case-card" onclick="openCase(${c.id})">
                    <div class="case-header">
                        <div class="case-avatar">${c.avatar}</div>
                        <div class="case-info">
                            <h3>${c.title}</h3>
                            <span class="tag">${c.tag}</span>
                        </div>
                    </div>
                    
                    <div class="case-stats">
                        <div class="case-stat">
                            <div class="value">${c.income}</div>
                            <div class="label">月收入</div>
                        </div>
                        <div class="case-stat">
                            <div class="value">${c.startup}</div>
                            <div class="label">启动成本</div>
                        </div>
                        <div class="case-stat">
                            <div class="value">${c.time}</div>
                            <div class="label">实现周期</div>
                        </div>
                    </div>
                    
                    <p class="case-desc">${c.desc}</p>
                    
                    <ul class="case-features">
                        ${c.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                    
                    <a href="#" class="view-btn" onclick="event.stopPropagation(); openCase(${c.id})">查看完整案例 →</a>
                </div>
            `).join('');
        }
        
        function openCase(id) {
            const caseData = cases.find(c => c.id === id);
            if (!caseData) return;
            
            document.getElementById('modalTitle').textContent = caseData.title;
            document.getElementById('modalTag').textContent = caseData.tag;
            
            const detail = caseData.detail;
            document.getElementById('modalBody').innerHTML = `
                <div class="detail-section">
                    <h3>📖 案例故事</h3>
                    <p>${detail.story}</p>
                </div>
                
                <div class="detail-section">
                    <h3>🔄 工作流详解</h3>
                    <div class="workflow-steps">
                        ${detail.workflow.map(w => `
                            <div class="workflow-step">
                                <div class="step-number">${w.step}</div>
                                <div class="step-content">
                                    <h4>${w.title}</h4>
                                    <p>${w.desc}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>🛠️ 工具清单</h3>
                    <div class="tools-grid">
                        ${detail.tools.map(t => `
                            <div class="tool-item">
                                <div class="icon">${t.icon}</div>
                                <div class="name">${t.name}</div>
                                <div class="cost">${t.cost}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>💰 定价策略</h3>
                    <div class="workflow-steps">
                        ${detail.pricing.map(p => `
                            <div class="workflow-step" style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
                                <div class="step-content" style="flex: 1;">
                                    <h4>${p.service}</h4>
                                </div>
                                <div style="color: #64b5f6; font-weight: 600;">${p.price}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>💡 成功秘诀</h3>
                    <div class="workflow-steps">
                        ${detail.tips.map((tip, i) => `
                            <div class="workflow-step" style="border-bottom: ${i < detail.tips.length - 1 ? '1px solid rgba(255,255,255,0.1)' : 'none'}; padding-bottom: ${i < detail.tips.length - 1 ? '15px' : '0'};">
                                <div class="step-number">${i + 1}</div>
                                <div class="step-content">
                                    <p>${tip}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            document.getElementById('caseModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('caseModal').classList.remove('active');
        }
        
        function showDownloadModal() {
            alert('完整案例库包含31个详细案例，请留下邮箱获取下载链接！');
        }
        
        // 分类筛选
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderCases(this.dataset.filter);
            });
        });
        
        // 点击模态框外部关闭
        document.getElementById('caseModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // 初始化
        renderCases();
    </script>
