<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- 标题 -->
  <text x="600" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Choose Your Plan</text>
  <text x="600" y="95" font-family="Arial, sans-serif" font-size="18" fill="#94A3B8" text-anchor="middle">Select the perfect plan for your needs</text>
  
  <!-- Basic Card -->
  <g transform="translate(50, 130)">
    <rect width="340" height="580" rx="16" fill="#1E293B" stroke="#334155" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="170" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#94A3B8" text-anchor="middle">Basic</text>
    <text x="170" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">$99</text>
    
    <line x1="30" y1="140" x2="310" y2="140" stroke="#334155" stroke-width="1"/>
    
    <!-- Features -->
    <g transform="translate(30, 170)">
      <text y="0" font-family="Arial" font-size="16" fill="#22C55E">✓</text>
      <text x="25" y="0" font-family="Arial" font-size="16" fill="white">ContentAI (1 Agent)</text>
      
      <text y="35" font-family="Arial" font-size="16" fill="#22C55E">✓</text>
      <text x="25" y="35" font-family="Arial" font-size="16" fill="white">Basic features</text>
      
      <text y="70" font-family="Arial" font-size="16" fill="#22C55E">✓</text>
      <text x="25" y="70" font-family="Arial" font-size="16" fill="white">Community support</text>
      
      <text y="105" font-family="Arial" font-size="16" fill="#64748B">✗</text>
      <text x="25" y="105" font-family="Arial" font-size="16" fill="#64748B">Advanced features</text>
      
      <text y="140" font-family="Arial" font-size="16" fill="#64748B">✗</text>
      <text x="25" y="140" font-family="Arial" font-size="16" fill="#64748B">Commercial license</text>
    </g>
    
    <!-- Button -->
    <rect x="30" y="480" width="280" height="50" rx="25" fill="#334155"/>
    <text x="170" y="512" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Choose Basic</text>
  </g>
  
  <!-- Pro Card (Featured) -->
  <g transform="translate(430, 110)">
    <!-- Popular Badge -->
    <rect x="90" y="-15" width="160" height="30" rx="15" fill="url(#goldGradient)"/>
    <text x="170" y="6" font-family="Arial" font-size="14" font-weight="bold" fill="#0F172A" text-anchor="middle">⭐ Most Popular</text>
    
    <rect width="340" height="620" rx="16" fill="#1E293B" stroke="#FFD700" stroke-width="3" filter="url(#cardShadow)"/>
    <text x="170" y="70" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFD700" text-anchor="middle">Pro</text>
    <text x="170" y="120" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle" filter="url(#glow)">$299</text>
    <text x="170" y="150" font-family="Arial" font-size="14" fill="#64748B" text-anchor="middle" text-decoration="line-through">Was $599</text>
    
    <line x1="30" y1="180" x2="310" y2="180" stroke="#334155" stroke-width="1"/>
    
    <!-- Features -->
    <g transform="translate(30, 210)">
      <text y="0" font-family="Arial" font-size="16" fill="#FFD700">✓</text>
      <text x="25" y="0" font-family="Arial" font-size="16" fill="white" font-weight="bold">All 6 Agents</text>
      
      <text y="35" font-family="Arial" font-size="16" fill="#FFD700">✓</text>
      <text x="25" y="35" font-family="Arial" font-size="16" fill="white">Complete system</text>
      
      <text y="70" font-family="Arial" font-size="16" fill="#FFD700">✓</text>
      <text x="25" y="70" font-family="Arial" font-size="16" fill="white">Advanced features</text>
      
      <text y="105" font-family="Arial" font-size="16" fill="#FFD700">✓</text>
      <text x="25" y="105" font-family="Arial" font-size="16" fill="white">Commercial license</text>
      
      <text y="140" font-family="Arial" font-size="16" fill="#FFD700">✓</text>
      <text x="25" y="140" font-family="Arial" font-size="16" fill="white">Priority support</text>
      
      <text y="175" font-family="Arial" font-size="16" fill="#FFD700">✓</text>
      <text x="25" y="175" font-family="Arial" font-size="16" fill="white">Lifetime updates</text>
    </g>
    
    <!-- Button -->
    <rect x="30" y="520" width="280" height="50" rx="25" fill="url(#goldGradient)"/>
    <text x="170" y="552" font-family="Arial" font-size="18" font-weight="bold" fill="#0F172A" text-anchor="middle">Choose Pro</text>
    
    <!-- 78% Badge -->
    <rect x="70" y="590" width="200" height="25" rx="12" fill="#22C55E" opacity="0.9"/>
    <text x="170" y="608" font-family="Arial" font-size="13" fill="white" text-anchor="middle">⭐ 78% Choose This</text>
  </g>
  
  <!-- Enterprise Card -->
  <g transform="translate(810, 130)">
    <rect width="340" height="580" rx="16" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="170" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8B5CF6" text-anchor="middle">Enterprise</text>
    <text x="170" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#8B5CF6" text-anchor="middle">$999</text>
    
    <line x1="30" y1="140" x2="310" y2="140" stroke="#334155" stroke-width="1"/>
    
    <!-- Features -->
    <g transform="translate(30, 170)">
      <text y="0" font-family="Arial" font-size="16" fill="#8B5CF6">✓</text>
      <text x="25" y="0" font-family="Arial" font-size="16" fill="white">Everything in Pro</text>
      
      <text y="35" font-family="Arial" font-size="16" fill="#8B5CF6">✓</text>
      <text x="25" y="35" font-family="Arial" font-size="16" fill="white">White-label license</text>
      
      <text y="70" font-family="Arial" font-size="16" fill="#8B5CF6">✓</text>
      <text x="25" y="70" font-family="Arial" font-size="16" fill="white">Custom development</text>
      
      <text y="105" font-family="Arial" font-size="16" fill="#8B5CF6">✓</text>
      <text x="25" y="105" font-family="Arial" font-size="16" fill="white">Source code ownership</text>
      
      <text y="140" font-family="Arial" font-size="16" fill="#8B5CF6">✓</text>
      <text x="25" y="140" font-family="Arial" font-size="16" fill="white">1-on-1 support (6mo)</text>
    </g>
    
    <!-- Button -->
    <rect x="30" y="480" width="280" height="50" rx="25" fill="#8B5CF6"/>
    <text x="170" y="512" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Choose Enterprise</text>
  </g>
</svg>