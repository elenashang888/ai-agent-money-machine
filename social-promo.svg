<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1080" height="1080" fill="url(#bgGradient)"/>
  
  <!-- 装饰网格 -->
  <g opacity="0.1">
    <line x1="0" y1="200" x2="1080" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1080" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="1080" y2="600" stroke="white" stroke-width="1"/>
    <line x1="0" y1="800" x2="1080" y2="800" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="1080" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="1080" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="1080" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="1080" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- 装饰圆点 -->
  <circle cx="150" cy="150" r="3" fill="white" opacity="0.4"/>
  <circle cx="930" cy="200" r="2" fill="white" opacity="0.3"/>
  <circle cx="100" cy="900" r="2.5" fill="white" opacity="0.35"/>
  <circle cx="950" cy="850" r="3" fill="white" opacity="0.4"/>
  <circle cx="50" cy="500" r="2" fill="white" opacity="0.3"/>
  <circle cx="1030" cy="550" r="2.5" fill="white" opacity="0.35"/>
  
  <!-- 顶部文字 -->
  <text x="540" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">🚀 AI AGENT</text>
  
  <!-- 主标题 -->
  <text x="540" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle" filter="url(#strongGlow)">MONEY</text>
  <text x="540" y="360" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle" filter="url(#strongGlow)">MACHINE</text>
  
  <!-- 中心美元符号 -->
  <text x="540" y="580" font-family="Arial, sans-serif" font-size="200" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle" filter="url(#strongGlow)">$</text>
  
  <!-- 6个AI Agent图标环绕 -->
  <g transform="translate(540, 580)">
    <!-- ContentAI -->
    <g transform="translate(0, -180)">
      <circle r="30" fill="#3B82F6" opacity="0.9"/>
      <text y="8" font-family="Arial" font-size="24" fill="white" text-anchor="middle">📝</text>
    </g>
    <!-- ServiceAI -->
    <g transform="translate(156, -90)">
      <circle r="30" fill="#10B981" opacity="0.9"/>
      <text y="8" font-family="Arial" font-size="24" fill="white" text-anchor="middle">💬</text>
    </g>
    <!-- ResearchAI -->
    <g transform="translate(156, 90)">
      <circle r="30" fill="#8B5CF6" opacity="0.9"/>
      <text y="8" font-family="Arial" font-size="24" fill="white" text-anchor="middle">🔍</text>
    </g>
    <!-- TradeAI -->
    <g transform="translate(0, 180)">
      <circle r="30" fill="#F59E0B" opacity="0.9"/>
      <text y="8" font-family="Arial" font-size="24" fill="white" text-anchor="middle">📈</text>
    </g>
    <!-- SEOAI -->
    <g transform="translate(-156, 90)">
      <circle r="30" fill="#EC4899" opacity="0.9"/>
      <text y="8" font-family="Arial" font-size="24" fill="white" text-anchor="middle">🎯</text>
    </g>
    <!-- EmailAI -->
    <g transform="translate(-156, -90)">
      <circle r="30" fill="#06B6D4" opacity="0.9"/>
      <text y="8" font-family="Arial" font-size="24" fill="white" text-anchor="middle">📧</text>
    </g>
  </g>
  
  <!-- 副标题 -->
  <text x="540" y="820" font-family="Arial, sans-serif" font-size="36" fill="white" text-anchor="middle" filter="url(#glow)">6 Agents Working 24/7</text>
  
  <!-- 收入展示 -->
  <text x="540" y="880" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#FFD700" text-anchor="middle" filter="url(#glow)">💰 $5500-25000/Month</text>
  
  <!-- 价格标签 -->
  <rect x="380" y="930" width="320" height="70" rx="35" fill="url(#goldGradient)"/>
  <text x="540" y="978" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1a1a2e" text-anchor="middle">ONLY $299</text>
  
  <!-- Limited Time -->
  <text x="540" y="1020" font-family="Arial, sans-serif" font-size="20" fill="#FFD700" text-anchor="middle">Limited Time Offer →</text>
</svg>