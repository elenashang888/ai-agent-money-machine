        let currentTemplate = null;
        
        function renderTemplates(category = 'all') {
            const grid = document.getElementById('templatesGrid');
            const filtered = category === 'all' ? templates : templates.filter(t => t.category === category);
            
            grid.innerHTML = filtered.map(t => `
                <div class="template-card" onclick="openModal(${t.id})">
                    <div class="icon">${t.icon}</div>
                    <h3>${t.title}</h3>
                    <p>${t.desc}</p>
                    <span class="tag">${t.tag}</span>
                </div>
            `).join('');
        }
        
        function openModal(id) {
            currentTemplate = templates.find(t => t.id === id);
            if (!currentTemplate) return;
            
            document.getElementById('modalTitle').textContent = currentTemplate.title;
            document.getElementById('modalSubject').innerHTML = highlightPlaceholders(currentTemplate.subject);
            document.getElementById('modalBody').innerHTML = highlightPlaceholders(currentTemplate.body);
            document.getElementById('templateModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('templateModal').classList.remove('active');
        }
        
        function highlightPlaceholders(text) {
            return text.replace(/\[([^\]]+)\]/g, '<span class="placeholder">[$1]</span>');
        }
        
        function copyTemplate() {
            if (!currentTemplate) return;
            
            const fullText = `主题：${currentTemplate.subject}\n\n${currentTemplate.body}`;
            navigator.clipboard.writeText(fullText).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }
        
        // 分类切换
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderTemplates(this.dataset.category);
            });
        });
        
        // 点击模态框外部关闭
        document.getElementById('templateModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // 初始化
        renderTemplates();
