<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO关键词分析器 - 免费工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .input-group {
            margin-bottom: 30px;
        }
        
        .input-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .input-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            min-height: 120px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        .input-group textarea:focus {
            outline: none;
            border-color: #11998e;
        }
        
        .analyze-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
        }
        
        .results {
            margin-top: 40px;
        }
        
        .results h3 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .keyword-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .keyword-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #11998e;
        }
        
        .keyword-card .word {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .keyword-card .metrics {
            display: flex;
            gap: 10px;
            font-size: 0.85rem;
            color: #666;
        }
        
        .metric {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        
        .score-high { color: #38ef7d; }
        .score-medium { color: #ffd93d; }
        .score-low { color: #ff6b6b; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e8f5e9 100%);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #11998e;
        }
        
        .stat-card .label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
        
        .suggestions {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
        }
        
        .suggestions h4 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .suggestion-list {
            list-style: none;
        }
        
        .suggestion-list li {
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        
        .suggestion-list li:last-child {
            border-bottom: none;
        }
        
        .suggestion-list li::before {
            content: '💡';
        }
        
        .cta-section {
            margin-top: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f5e9 100%);
            border-radius: 15px;
            text-align: center;
        }
        
        .cta-section h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .cta-section p {
            color: #666;
            margin-bottom: 20px;
        }
        
        .cta-btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s;
        }
        
        .cta-btn:hover {
            transform: scale(1.05);
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 SEO关键词分析器</h1>
            <p>粘贴你的内容，一键提取关键词并分析SEO价值</p>
        </div>
        
        <div class="tool-card">
            <div class="input-group">
                <label>粘贴你的文章或内容</label>
                <textarea id="contentInput" placeholder="在这里粘贴你的文章内容，我们会自动分析关键词密度、提取高价值关键词，并给出SEO优化建议..."></textarea>
            </div>
            
            <button class="analyze-btn" onclick="analyzeContent()">🔍 分析SEO关键词</button>
            
            <div class="results" id="results" style="display: none;">
                <h3>📊 分析结果</h3>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="number" id="wordCount">0</div>
                        <div class="label">总字数</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="keywordCount">0</div>
                        <div class="label">关键词数</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="avgDensity">0%</div>
                        <div class="label">平均密度</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="seoScore">0</div>
                        <div class="label">SEO评分</div>
                    </div>
                </div>
                
                <h3>🎯 高价值关键词</h3>
                <div class="keyword-grid" id="keywordGrid"></div>
                
                <div class="suggestions">
                    <h4>💡 SEO优化建议</h4>
                    <ul class="suggestion-list" id="suggestionList"></ul>
                </div>
            </div>
            
            <div class="cta-section">
                <h3>🚀 想要全自动SEO优化？</h3>
                <p>获取AI SEO Agent，自动分析、优化、追踪排名</p>
                <a href="https://elenashang888.github.io/ai-agent-money-machine/" class="cta-btn">了解完整系统 →</a>
            </div>
        </div>
        
        <div class="footer">
            <p>Powered by AgentVerse AI | 免费工具，无限使用</p>
        </div>
    </div>
    
    <script>
        // 停用词
        const stopWords = new Set([
            '的', '了', '在', '是', '我', '有', '和', '就', '不', '人', '都', '一', '一个', '上', '也', '很', '到', '说', '要', '去', '你', '会', '着', '没有', '看', '好', '自己', '这', '那', '这些', '那些', '这个', '那个', '之', '与', '及', '等', '或', '但', '而', '如果', '因为', '所以', '虽然', '但是', 'the', 'a', 'an', 'is', 'are', 'was', 'were', 'be', 'been', 'being', 'have', 'has', 'had', 'do', 'does', 'did', 'will', 'would', 'could', 'should', 'may', 'might', 'must', 'shall', 'can', 'need', 'dare', 'ought', 'used', 'to', 'of', 'in', 'for', 'on', 'with', 'at', 'by', 'from', 'as', 'into', 'through', 'during', 'before', 'after', 'above', 'below', 'between', 'under', 'and', 'but', 'or', 'yet', 'so', 'if', 'because', 'although', 'though', 'while', 'where', 'when', 'that', 'which', 'who', 'whom', 'whose', 'what', 'whatever', 'whoever', 'whomever', 'this', 'these', 'those', 'such'
        ]);
        
        // 高价值行业词
        const highValueKeywords = {
            'AI': 95, '人工智能': 95, '机器学习': 90, '深度学习': 88,
            '赚钱': 85, '副业': 82, '收入': 80, '创业': 78, '投资': 75,
            '营销': 80, '推广': 78, '流量': 82, '转化': 80, '增长': 78,
            '自媒体': 85, '公众号': 82, '小红书': 85, '抖音': 88, 'B站': 82,
            '教程': 75, '攻略': 78, '指南': 75, '方法': 72, '技巧': 70,
            '工具': 72, '软件': 70, '平台': 68, '系统': 70, '自动化': 75,
            '效率': 72, '优化': 70, '提升': 68, '增加': 68, '提高': 68,
            '免费': 78, '快速': 75, '简单': 72, '容易': 70, '轻松': 72,
            '秘籍': 80, '秘诀': 78, '揭秘': 82, '内幕': 80, '真相': 78,
            '必看': 75, '干货': 78, '精华': 75, '收藏': 72, '推荐': 70
        };
        
        function analyzeContent() {
            const content = document.getElementById('contentInput').value.trim();
            
            if (!content) {
                alert('请输入内容！');
                return;
            }
            
            // 统计字数
            const wordCount = content.length;
            
            // 提取关键词
            const words = extractKeywords(content);
            
            // 计算SEO评分
            const seoScore = calculateSEOScore(content, words);
            
            // 更新统计
            document.getElementById('wordCount').textContent = wordCount;
            document.getElementById('keywordCount').textContent = words.length;
            document.getElementById('avgDensity').textContent = (words.reduce((a, b) => a + b.density, 0) / words.length).toFixed(1) + '%';
            document.getElementById('seoScore').textContent = seoScore;
            
            // 显示关键词
            displayKeywords(words);
            
            // 生成建议
            generateSuggestions(content, words, seoScore);
            
            document.getElementById('results').style.display = 'block';
        }
        
        function extractKeywords(content) {
            // 分词（简化版）
            const words = {};
            const segments = content.match(/[\u4e00-\u9fa5]{2,6}|[a-zA-Z]{3,}/g) || [];
            
            segments.forEach(word => {
                if (!stopWords.has(word) && word.length >= 2) {
                    words[word] = (words[word] || 0) + 1;
                }
            });
            
            // 转换为数组并计算密度
            const totalWords = Object.values(words).reduce((a, b) => a + b, 0);
            
            return Object.entries(words)
                .map(([word, count]) => ({
                    word,
                    count,
                    density: ((count / totalWords) * 100).toFixed(1),
                    value: highValueKeywords[word] || Math.min(count * 5, 60)
                }))
                .sort((a, b) => b.value - a.value)
                .slice(0, 12);
        }
        
        function calculateSEOScore(content, keywords) {
            let score = 50;
            
            // 内容长度
            if (content.length > 500) score += 10;
            if (content.length > 1000) score += 10;
            
            // 关键词密度
            const avgDensity = keywords.reduce((a, b) => a + parseFloat(b.density), 0) / keywords.length;
            if (avgDensity >= 1 && avgDensity <= 3) score += 15;
            else if (avgDensity > 3) score += 5;
            
            // 高价值关键词数量
            const highValueCount = keywords.filter(k => k.value >= 70).length;
            score += highValueCount * 3;
            
            return Math.min(score, 100);
        }
        
        function displayKeywords(keywords) {
            const grid = document.getElementById('keywordGrid');
            
            grid.innerHTML = keywords.map(k => {
                let scoreClass = 'score-low';
                if (k.value >= 80) scoreClass = 'score-high';
                else if (k.value >= 60) scoreClass = 'score-medium';
                
                return `
                    <div class="keyword-card">
                        <div class="word">${k.word}</div>
                        <div class="metrics">
                            <span class="metric">📊 ${k.count}次</span>
                            <span class="metric">📈 ${k.density}%</span>
                            <span class="metric ${scoreClass}">⭐ ${k.value}分</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function generateSuggestions(content, keywords, seoScore) {
            const suggestions = [];
            
            // 内容长度建议
            if (content.length < 300) {
                suggestions.push('内容太短，建议扩展到500字以上以获得更好的SEO效果');
            } else if (content.length > 2000) {
                suggestions.push('内容较长，建议分段并添加小标题提高可读性');
            }
            
            // 关键词密度建议
            const avgDensity = keywords.reduce((a, b) => a + parseFloat(b.density), 0) / keywords.length;
            if (avgDensity < 1) {
                suggestions.push('关键词密度偏低，建议适当增加核心关键词出现次数');
            } else if (avgDensity > 5) {
                suggestions.push('关键词密度过高，可能被搜索引擎判定为堆砌，建议降低至1-3%');
            }
            
            // 高价值关键词建议
            const highValueCount = keywords.filter(k => k.value >= 70).length;
            if (highValueCount < 3) {
                suggestions.push('建议增加更多行业高价值关键词，如"AI"、"赚钱"、"副业"等');
            }
            
            // 长尾关键词建议
            const longTailCount = keywords.filter(k => k.word.length >= 4).length;
            if (longTailCount < 5) {
                suggestions.push('建议增加长尾关键词（4字以上），竞争度更低，转化率更高');
            }
            
            // 标题建议
            if (!content.includes('【') && !content.includes('「')) {
                suggestions.push('建议添加结构化标题，使用【】或「」符号提高可读性');
            }
            
            // 数字建议
            if (!/\d/.test(content.substring(0, 100))) {
                suggestions.push('建议在开头使用数字，如"5个方法"、"3个技巧"，提高点击率');
            }
            
            document.getElementById('suggestionList').innerHTML = suggestions.map(s => `<li>${s}</li>`).join('');
        }
    </script>
</body>
</html>
